name: _rollback (reusable)

# Reusable rollback workflow. Per-instance shim chooses env via choice
# input; this workflow honours per-env protection (required reviewer for
# staging/production) automatically via the inherited environment rules.

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      changeset:
        type: string
        required: true
      dry_run:
        type: boolean
        required: false
        default: false

permissions:
  contents: write

# Serialize same-env+same-branch rollbacks (e.g. accidental double-click on
# the workflow_dispatch button). See _deploy-dev.yml for full rationale.
concurrency:
  group: rollback-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OdooAiDeployer
        run: pip install "git+https://github.com/dietbald/OdooAiDeployer.git@main"

      - name: Validate inputs (shell-safety)
        env:
          CS: ${{ inputs.changeset }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          set -e
          if ! [[ "$CS" =~ ^[A-Za-z0-9][A-Za-z0-9_.-]*$ ]]; then
            echo "::error::Refusing changeset name '$CS' — must match ^[A-Za-z0-9][A-Za-z0-9_.-]*\$."
            exit 1
          fi
          case "$ENV_NAME" in
            dev|staging|production) ;;
            *) echo "::error::Invalid env '$ENV_NAME'"; exit 1 ;;
          esac

      - name: Roll back
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          ODOO_ENV_NAME: ${{ inputs.environment }}
          CS: ${{ inputs.changeset }}
          ENV_NAME: ${{ inputs.environment }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -e
          DRY=""
          if [ "$DRY_RUN" = "true" ]; then DRY="--dry-run"; fi
          odoo-deploy --repo . rollback --env "$ENV_NAME" --changeset "$CS" $DRY

      - name: Commit rollback audit
        if: inputs.dry_run != true
        env:
          CS: ${{ inputs.changeset }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audits/ || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "rollback: ${ENV_NAME}/${CS}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
