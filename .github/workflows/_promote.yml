name: _promote (reusable)

# Reusable promotion workflow. Called by per-instance `promote-staging.yml`
# and `promote-prod.yml`, each passing the right `environment` input. The
# `environment:` declaration on the job inherits the caller repo's
# environment-protection rules (required reviewers, secrets, wait timer).

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        description: "staging or production"
      changeset:
        type: string
        required: true
        description: "Changeset id to promote"

permissions:
  contents: write

# Serialize same-env+same-branch promotes. Different envs (staging vs
# production) can still run in parallel because the group key includes
# `environment`. See _deploy-dev.yml for the full rationale.
concurrency:
  group: promote-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OdooAiDeployer
        run: pip install "git+https://github.com/dietbald/OdooAiDeployer.git@main"

      - name: Validate inputs (shell-safety)
        env:
          CS: ${{ inputs.changeset }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          set -e
          if ! [[ "$CS" =~ ^[A-Za-z0-9][A-Za-z0-9_.-]*$ ]]; then
            echo "::error::Refusing changeset name '$CS' — must match ^[A-Za-z0-9][A-Za-z0-9_.-]*\$."
            exit 1
          fi
          case "$ENV_NAME" in
            staging|production) ;;
            *) echo "::error::_promote.yml only supports staging/production; got '$ENV_NAME'"; exit 1 ;;
          esac

      - name: Promotion gate (production only — verify dev + staging audits)
        if: inputs.environment == 'production'
        env:
          CS: ${{ inputs.changeset }}
        run: |
          set -e
          for env in dev staging; do
            if [ ! -f "audits/$env/$CS.json" ]; then
              echo "::error::Missing audits/$env/$CS.json — must promote through $env first."
              exit 1
            fi
          done
          # status surfaces sha mismatches across envs
          odoo-deploy --repo . status --changeset "$CS"

      - name: Validate before promote
        env:
          CS: ${{ inputs.changeset }}
        run: odoo-deploy --repo . validate --changeset "$CS"

      - name: Deploy to ${{ inputs.environment }}
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          ODOO_ENV_NAME: ${{ inputs.environment }}
          CS: ${{ inputs.changeset }}
          ENV_NAME: ${{ inputs.environment }}
        run: odoo-deploy --repo . deploy --env "$ENV_NAME" --changeset "$CS" --no-commit

      - name: Verify post-deploy
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          ODOO_ENV_NAME: ${{ inputs.environment }}
          CS: ${{ inputs.changeset }}
          ENV_NAME: ${{ inputs.environment }}
        run: odoo-deploy --repo . verify --env "$ENV_NAME" --changeset "$CS"

      - name: Commit audit + rollback snapshot
        env:
          CS: ${{ inputs.changeset }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "audits/${ENV_NAME}/" "rollback_snapshots/${ENV_NAME}/" || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "deploy: ${ENV_NAME}/${CS}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      # Once production deploy lands on an ai/* branch, close the loop:
      # squash-merge the branch into main so main is the canonical record
      # of what's live in prod, and delete the now-redundant ai/* branch.
      # Only fires when:
      #   * environment == production  (we don't auto-merge after staging)
      #   * triggered from an ai/* branch  (main and dev/* are intentional
      #     manual workflows, not subject to auto-merge)
      #   * all prior steps succeeded
      # Skips cleanly if the branch is already merged or no diff vs main.
      - name: Auto-merge ai/* → main after successful prod deploy
        if: inputs.environment == 'production' && success() && startsWith(github.ref_name, 'ai/')
        env:
          CS: ${{ inputs.changeset }}
          BRANCH: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          git fetch origin main --depth=1 2>/dev/null || true
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "Branch is already an ancestor of main — nothing to merge."
            exit 0
          fi
          # If a PR is already open for this branch, reuse it; else open one.
          pr_num=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
                   --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -z "$pr_num" ]; then
            pr_url=$(gh pr create --repo "$REPO" \
              --base main --head "$BRANCH" \
              --title "${CS}: shipped to production" \
              --body "Auto-opened by promote-prod after successful deploy. Branch carries audits for dev / staging / production. Squash-merging so main remains the canonical record of what's live.")
            pr_num=$(echo "$pr_url" | grep -oE '[0-9]+$')
            echo "Opened PR #${pr_num}"
          else
            echo "PR #${pr_num} already open, will merge it"
          fi
          gh pr merge "$pr_num" --repo "$REPO" --squash --delete-branch
          echo "Squash-merged PR #${pr_num} → main and deleted ${BRANCH}"
