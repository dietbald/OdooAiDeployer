name: promote-staging

# Thin shim — all logic lives in OdooAiDeployer/.github/workflows/_promote.yml.

on:
  workflow_dispatch:
    inputs:
      changeset:
        description: "Changeset id to promote to staging"
        required: true

permissions:
  contents: write

jobs:
  promote:
    uses: dietbald/OdooAiDeployer/.github/workflows/_promote.yml@main
    with:
      environment: staging
      changeset: ${{ github.event.inputs.changeset }}
    secrets: inherit
