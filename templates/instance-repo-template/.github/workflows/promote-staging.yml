name: promote-staging

on:
  workflow_dispatch:
    inputs:
      changeset:
        description: "Changeset id to promote to staging"
        required: true

permissions:
  contents: write

jobs:
  promote-staging:
    runs-on: ubuntu-latest
    environment: staging  # Required reviewer enforced by GitHub env protection
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OdooAiDeployer
        run: pip install "git+https://github.com/dietbald/OdooAiDeployer.git@main"

      - name: Validate before promote
        run: odoo-deploy --repo . validate --changeset "${{ github.event.inputs.changeset }}"

      - name: Deploy to staging
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          odoo-deploy --repo . deploy --env staging \
            --changeset "${{ github.event.inputs.changeset }}" --no-commit

      - name: Verify post-deploy
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          odoo-deploy --repo . verify --env staging \
            --changeset "${{ github.event.inputs.changeset }}"

      - name: Commit audit + rollback snapshot
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audits/staging/ rollback_snapshots/staging/ || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "deploy: staging/${{ github.event.inputs.changeset }}"
            git push origin HEAD:main
          fi
