name: promote-prod

# Thin shim — all logic lives in OdooAiDeployer/.github/workflows/_promote.yml.
# The reusable workflow runs the dev+staging audit gate when environment=production.

on:
  workflow_dispatch:
    inputs:
      changeset:
        description: "Changeset id to promote to production"
        required: true

permissions:
  contents: write

jobs:
  promote:
    uses: dietbald/OdooAiDeployer/.github/workflows/_promote.yml@main
    with:
      environment: production
      changeset: ${{ github.event.inputs.changeset }}
    secrets: inherit
