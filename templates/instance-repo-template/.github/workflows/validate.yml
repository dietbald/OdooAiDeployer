name: validate

# Thin shim — all logic lives in OdooAiDeployer/.github/workflows/_validate.yml.
# Per-instance customizations should be additions in this file (extra steps,
# notifications, etc.), not edits to the called workflow.

on:
  push:
    branches:
      - 'ai/**'
      - 'dev/**'
      - 'hotfix/**'
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    uses: dietbald/OdooAiDeployer/.github/workflows/_validate.yml@main
