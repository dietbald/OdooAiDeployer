name: deploy-dev

# Thin shim — all logic lives in OdooAiDeployer/.github/workflows/_deploy-dev.yml.

on:
  push:
    branches:
      - 'ai/**'
      - 'dev/**'
      - main
  workflow_dispatch:
    inputs:
      changeset:
        description: "Changeset id (folder name); leave blank to auto-detect from this push"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  deploy-dev:
    uses: dietbald/OdooAiDeployer/.github/workflows/_deploy-dev.yml@main
    with:
      changeset: ${{ github.event.inputs.changeset || '' }}
    secrets: inherit
