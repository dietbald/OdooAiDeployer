name: rollback

# Thin shim — all logic lives in OdooAiDeployer/.github/workflows/_rollback.yml.

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to roll back (dev, staging, production)"
        required: true
        type: choice
        options: [dev, staging, production]
      changeset:
        description: "Changeset id to roll back"
        required: true
      dry_run:
        description: "Preview only (don't write to Odoo)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  rollback:
    uses: dietbald/OdooAiDeployer/.github/workflows/_rollback.yml@main
    with:
      environment: ${{ github.event.inputs.env }}
      changeset: ${{ github.event.inputs.changeset }}
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
    secrets: inherit
